{{define "title"}}Sign Up - Pod Tracker{{end}}

{{define "content"}}
<main class="shell narrow">
  <section class="page-header">
    <p class="eyebrow">Create account</p>
    <h1>Sign up</h1>
  </section>

  <form class="form-panel" action="/signup" method="post">
    {{if .Error}}<p class="form-error">{{.Error}}</p>{{end}}
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

    <label>
      <span>Email</span>
      <input name="email" type="email" autocomplete="email" value="{{.Email}}" required>
    </label>

    <label>
      <span>Display name</span>
      <input name="display_name" autocomplete="name" value="{{.DisplayName}}" required>
    </label>

    <label>
      <span>Password</span>
      <input name="password" type="password" autocomplete="new-password" minlength="12" required>
    </label>

    <button class="button primary" type="submit">Create account</button>
  </form>
</main>
{{end}}
