{{define "title"}}Settings - Pod Tracker{{end}}

{{define "content"}}
<main class="shell narrow">
  <section class="page-header">
    <p class="eyebrow">Account</p>
    <h1>Settings</h1>
  </section>

  <section class="form-panel">
    <dl class="details">
      <div>
        <dt>Display name</dt>
        <dd>{{.CurrentUser.DisplayName}}</dd>
      </div>
      <div>
        <dt>Email</dt>
        <dd>{{.CurrentUser.Email}}</dd>
      </div>
    </dl>
  </section>
</main>
{{end}}
