{{define "title"}}Plan Event - {{.Playgroup.Name}}{{end}}

{{define "content"}}
<div class="max-w-2xl mx-auto">
  <div class="mb-8">
    <a href="/playgroups/{{.Playgroup.Slug}}" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">&larr; Back to {{.Playgroup.Name}}</a>
  </div>
  
  <form action="/playgroups/{{.Playgroup.Slug}}/events" method="POST" class="bg-white shadow-sm ring-1 ring-gray-900/5 sm:rounded-xl md:col-span-2">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    
    <div class="px-4 py-6 sm:p-8">
      <div class="grid max-w-2xl grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">
        <div class="sm:col-span-4">
          <h2 class="text-base font-semibold leading-7 text-gray-900">Plan a New Event</h2>
          <p class="mt-1 text-sm leading-6 text-gray-600">Set the time and visibility for the next Commander night.</p>
        </div>

        {{if .Error}}
        <div class="sm:col-span-full rounded-md bg-red-50 p-4">
          <div class="flex">
            <div class="ml-3">
              <h3 class="text-sm font-medium text-red-800">{{.Error}}</h3>
            </div>
          </div>
        </div>
        {{end}}

        <div class="col-span-full">
          <label for="title" class="block text-sm font-medium leading-6 text-gray-900">Event Title</label>
          <div class="mt-2">
            <input type="text" name="title" id="title" required placeholder="e.g., Friday Night Magic" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
          </div>
        </div>

        <div class="col-span-full">
          <label for="description" class="block text-sm font-medium leading-6 text-gray-900">Description (Optional)</label>
          <div class="mt-2">
            <textarea id="description" name="description" rows="3" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"></textarea>
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="start_time" class="block text-sm font-medium leading-6 text-gray-900">Start Time</label>
          <div class="mt-2">
            <input type="datetime-local" name="start_time" id="start_time" required class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="visibility" class="block text-sm font-medium leading-6 text-gray-900">Visibility</label>
          <div class="mt-2">
            <select id="visibility" name="visibility" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:max-w-xs sm:text-sm sm:leading-6">
              <option value="members">Members Only</option>
              <option value="invite_only">Invite Only</option>
              <option value="public_safe">Public (Safe)</option>
            </select>
          </div>
        </div>

        <div class="col-span-full border-t border-gray-200 pt-6">
          <h2 class="text-base font-semibold leading-7 text-gray-900">Location</h2>
        </div>

        <div class="col-span-full">
          <label for="location_name" class="block text-sm font-medium leading-6 text-gray-900">Location Name</label>
          <div class="mt-2">
            <input type="text" name="location_name" id="location_name" placeholder="e.g., Stephen's table" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
          </div>
        </div>

        <div class="col-span-full">
          <label for="address_line1" class="block text-sm font-medium leading-6 text-gray-900">Address Line 1</label>
          <div class="mt-2">
            <input type="text" name="address_line1" id="address_line1" autocomplete="address-line1" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
          </div>
        </div>

        <div class="col-span-full">
          <label for="address_line2" class="block text-sm font-medium leading-6 text-gray-900">Address Line 2</label>
          <div class="mt-2">
            <input type="text" name="address_line2" id="address_line2" autocomplete="address-line2" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
          </div>
        </div>

        <div class="sm:col-span-2">
          <label for="city" class="block text-sm font-medium leading-6 text-gray-900">City</label>
          <div class="mt-2">
            <input type="text" name="city" id="city" autocomplete="address-level2" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
          </div>
        </div>

        <div class="sm:col-span-2">
          <label for="state_province" class="block text-sm font-medium leading-6 text-gray-900">State</label>
          <div class="mt-2">
            <input type="text" name="state_province" id="state_province" autocomplete="address-level1" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
          </div>
        </div>

        <div class="sm:col-span-2">
          <label for="postal_code" class="block text-sm font-medium leading-6 text-gray-900">Postal Code</label>
          <div class="mt-2">
            <input type="text" name="postal_code" id="postal_code" autocomplete="postal-code" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="country" class="block text-sm font-medium leading-6 text-gray-900">Country</label>
          <div class="mt-2">
            <input type="text" name="country" id="country" autocomplete="country-name" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="address_visibility" class="block text-sm font-medium leading-6 text-gray-900">Address Visibility</label>
          <div class="mt-2">
            <select id="address_visibility" name="address_visibility" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
              <option value="rsvps">Confirmed RSVPs</option>
              <option value="members">Playgroup Members</option>
              <option value="hidden">Hosts and Admins</option>
              <option value="public">Public</option>
            </select>
          </div>
        </div>

      </div>
    </div>
    <div class="flex items-center justify-end gap-x-6 border-t border-gray-900/10 px-4 py-4 sm:px-8">
      <a href="/playgroups/{{.Playgroup.Slug}}" class="text-sm font-semibold leading-6 text-gray-900">Cancel</a>
      <button type="submit" class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Save Event</button>
    </div>
  </form>
</div>
{{end}}
